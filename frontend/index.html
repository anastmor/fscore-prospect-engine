<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>F-Score Prospect Engine</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=DM+Mono:wght@400;500&family=Playfair+Display:wght@700;800&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #07070c; color: #fff; font-family: 'DM Sans', sans-serif; }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 4px; }

    @keyframes fadeIn  { from { opacity:0; transform:translateY(6px)  } to { opacity:1; transform:translateY(0) } }
    @keyframes fadeInUp{ from { opacity:0; transform:translateY(14px) } to { opacity:1; transform:translateY(0) } }
    @keyframes spin    { to   { transform: rotate(360deg) } }
    @keyframes dotBounce {
      0%,80%,100% { transform:translateY(0);  opacity:0.3 }
      40%         { transform:translateY(-6px); opacity:1   }
    }
    @keyframes iconPulse {
      0%,100% { box-shadow: 0 0 0 0   rgba(139,92,246,0.55) }
      60%     { box-shadow: 0 0 0 9px rgba(139,92,246,0)    }
    }
    @keyframes gradientShift {
      0%,100% { background-position: 0% 50% }
      50%     { background-position: 100% 50% }
    }
    @keyframes shimmer {
      from { background-position: -200% center }
      to   { background-position:  200% center }
    }

    /* Card hover — transform/shadow added via class; background stays inline */
    .card {
      transition: transform 0.2s cubic-bezier(0.4,0,0.2,1),
                  box-shadow 0.2s cubic-bezier(0.4,0,0.2,1),
                  border-color 0.2s !important;
    }
    .card:hover {
      transform: translateY(-2px) !important;
      box-shadow: 0 8px 28px rgba(0,0,0,0.45) !important;
    }
    .card-hi:hover  { border-color: rgba(34,197,94,0.22)  !important; }
    .card-warm:hover{ border-color: rgba(234,179,8,0.18)  !important; }
    .card-def:hover { border-color: rgba(255,255,255,0.1) !important; }

    /* Hunter action buttons */
    .hunter-btn {
      transition: transform 0.18s cubic-bezier(0.4,0,0.2,1),
                  box-shadow 0.18s,
                  border-color 0.18s,
                  background 0.18s !important;
    }
    .hunter-btn:hover:not([disabled]) {
      transform: translateY(-2px) !important;
      box-shadow: 0 6px 22px rgba(139,92,246,0.28) !important;
      border-color: rgba(139,92,246,0.5) !important;
      background: rgba(139,92,246,0.12) !important;
    }
    .hunter-btn:active:not([disabled]) { transform: translateY(0) !important; }

    /* Hunter avatar pulse */
    .hunter-icon { animation: iconPulse 3s ease-in-out infinite; }

    /* Tab nav buttons */
    .tab-btn { transition: all 0.18s !important; }
    .tab-btn:hover { background: rgba(99,102,241,0.1) !important; color: rgba(255,255,255,0.65) !important; }
    .tab-btn-hunter:hover { background: rgba(139,92,246,0.18) !important; color: #d4bbff !important; }

    /* Run button shimmer effect */
    .run-btn {
      background-size: 200% auto !important;
      transition: background-position 0.4s, transform 0.15s, box-shadow 0.15s !important;
    }
    .run-btn:hover:not([disabled]) {
      background-position: right center !important;
      transform: translateY(-1px) !important;
      box-shadow: 0 6px 24px rgba(99,102,241,0.4) !important;
    }

    /* Pill hover */
    .pill { transition: all 0.15s !important; }
    .pill:hover { border-color: rgba(99,102,241,0.5) !important; color: rgba(255,255,255,0.7) !important; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useMemo, useEffect, useCallback } = React;

    const API = window.location.hostname === "localhost" || window.location.hostname === "127.0.0.1"
      ? "http://localhost:8000/api"
      : "https://fscore-prospect-engine.onrender.com/api";

    // ─── Components ───

    const Pill = ({ children, active, onClick }) => (
      <button className="pill" onClick={onClick} style={{
        padding: "6px 13px", borderRadius: 100, border: "1px solid",
        borderColor: active ? "#6366f1" : "rgba(255,255,255,0.07)",
        background: active ? "rgba(99,102,241,0.14)" : "rgba(255,255,255,0.02)",
        color: active ? "#a5b4fc" : "rgba(255,255,255,0.4)",
        fontSize: 11, fontFamily: "'DM Sans', sans-serif", cursor: "pointer",
        fontWeight: active ? 600 : 400,
      }}>{children}</button>
    );

    const FeatureBar = ({ label, value, color }) => (
      <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 6 }}>
        <span style={{ fontSize: 10, color: "rgba(255,255,255,0.3)", minWidth: 95, fontFamily: "'DM Sans'" }}>{label}</span>
        <div style={{ flex: 1, height: 4, borderRadius: 2, background: "rgba(255,255,255,0.04)", overflow: "hidden" }}>
          <div style={{ width: `${value * 100}%`, height: "100%", borderRadius: 2, background: `linear-gradient(90deg, ${color}99, ${color})`, transition: "width 0.7s cubic-bezier(0.4,0,0.2,1)" }} />
        </div>
        <span style={{ fontSize: 10, color: "rgba(255,255,255,0.3)", fontFamily: "'DM Mono'", minWidth: 28, textAlign: "right" }}>{(value * 100).toFixed(0)}%</span>
      </div>
    );

    const Spinner = () => (
      <div style={{ display: "flex", flexDirection: "column", alignItems: "center", padding: "40px 0", gap: 12 }}>
        <div style={{ width: 28, height: 28, border: "2px solid rgba(99,102,241,0.15)", borderTopColor: "#6366f1", borderRadius: "50%", animation: "spin 0.75s linear infinite" }} />
        <span style={{ fontSize: 11, color: "rgba(255,255,255,0.2)", letterSpacing: 0.5 }}>Scoring pipeline running…</span>
      </div>
    );

    const TypingDots = ({ msg }) => (
      <div style={{ display: "flex", alignItems: "center", gap: 10, padding: "16px 0" }}>
        <div style={{ display: "flex", gap: 4, alignItems: "center" }}>
          {[0, 0.2, 0.4].map((d, i) => (
            <div key={i} style={{ width: 6, height: 6, borderRadius: "50%", background: "#8b5cf6", animation: `dotBounce 1.3s ease-in-out ${d}s infinite` }} />
          ))}
        </div>
        <span style={{ fontSize: 12, color: "rgba(255,255,255,0.35)", fontStyle: "italic", letterSpacing: 0.2 }}>{msg}</span>
      </div>
    );

    // ─── Config ───
    const SECTORS = ["Tech", "Medical", "Legal", "Finance", "Real Estate", "Business", "Corporate", "Retired", "Consulting", "Sports", "Academic"];
    const EVENT_CATS = [
      { id: "liquidity", label: "Liquidity Events" },
      { id: "inheritance", label: "Inheritance" },
      { id: "retirement", label: "Retirement" },
      { id: "divorce", label: "Divorce" },
      { id: "real_estate", label: "Real Estate" },
      { id: "career", label: "Career Change" },
      { id: "family", label: "Family" },
    ];
    const STATES = ["NY","CA","IL","TX","AZ","WA","CO","MA","FL","GA","NC","TN","OR","MN","CT","MD","PA","UT","NJ"];
    const ASSET_OPTIONS = [
      { value: 100000, label: "$100K" }, { value: 250000, label: "$250K" },
      { value: 500000, label: "$500K" }, { value: 1000000, label: "$1M" },
      { value: 2000000, label: "$2M" }, { value: 5000000, label: "$5M" },
    ];
    const MAX_ASSET_OPTIONS = [
      { value: 1000000, label: "$1M" }, { value: 2000000, label: "$2M" },
      { value: 5000000, label: "$5M" }, { value: 10000000, label: "$10M" },
      { value: 25000000, label: "$25M" }, { value: 50000000, label: "$50M" },
    ];

    const colorOf = (s) => s >= 80 ? "#22c55e" : s >= 60 ? "#eab308" : s >= 40 ? "#f97316" : "#64748b";
    const fmt = (n) => n >= 1e6 ? `$${(n/1e6).toFixed(1)}M` : n >= 1e3 ? `$${(n/1e3).toFixed(0)}K` : `$${n}`;

    // ─── Hunter Result Renderer ───

    const HunterResult = ({ result }) => {
      const { action, data } = result;
      const sec = { marginBottom: 12 };
      const lbl = { fontSize: 10, fontWeight: 700, color: "rgba(255,255,255,0.3)", textTransform: "uppercase", letterSpacing: 0.8, marginBottom: 5 };
      const txt = { fontSize: 12, color: "rgba(255,255,255,0.6)", lineHeight: 1.7, whiteSpace: "pre-wrap" };
      const pill = { fontSize: 10, padding: "3px 9px", borderRadius: 100, background: "rgba(99,102,241,0.1)", color: "#a5b4fc", display: "inline-block", margin: "2px 3px 2px 0" };
      const card = { background: "rgba(255,255,255,0.02)", border: "1px solid rgba(255,255,255,0.05)", borderRadius: 8, padding: "10px 12px", marginBottom: 8 };

      if (action === "strategy") return (
        <div>
          <div style={{ fontSize: 11, fontWeight: 700, color: "#a5b4fc", marginBottom: 12 }}>Growth Strategy</div>
          <div style={sec}><div style={lbl}>Campaign Types</div><div>{data.campaign_types.map((t,i) => <span key={i} style={pill}>{t}</span>)}</div></div>
          <div style={sec}><div style={lbl}>Target Segments</div>{data.target_segments.map((s,i) => <div key={i} style={{ ...txt, paddingLeft: 10, borderLeft: "2px solid rgba(99,102,241,0.2)", marginBottom: 4 }}>{s}</div>)}</div>
          <div style={sec}><div style={lbl}>Content Themes</div><div>{data.content_themes.map((t,i) => <span key={i} style={pill}>{t}</span>)}</div></div>
          <div style={sec}><div style={lbl}>Channel Mix</div>{Object.entries(data.channel_mix).map(([ch,note]) => <div key={ch} style={{ marginBottom: 4, fontSize: 12, color: "rgba(255,255,255,0.5)" }}><strong style={{ color: "rgba(255,255,255,0.6)" }}>{ch}:</strong> {note}</div>)}</div>
          <div style={sec}><div style={lbl}>Full Strategy</div><div style={txt}>{data.full_strategy}</div></div>
        </div>
      );

      if (action === "campaign") return (
        <div>
          <div style={{ fontSize: 11, fontWeight: 700, color: "#a5b4fc", marginBottom: 12 }}>Campaign Plan: {data.campaign_type}</div>
          <div style={sec}><div style={lbl}>4-Week Plan</div><div style={txt}>{data.four_week_plan}</div></div>
          <div style={sec}>
            <div style={lbl}>Sample Content</div>
            {data.sample_content.map((c,i) => <div key={i} style={card}><div style={{ fontSize: 9, color: "rgba(255,255,255,0.2)", textTransform: "uppercase", marginBottom: 4 }}>Piece {i+1}</div><div style={txt}>{c}</div></div>)}
          </div>
          <div style={sec}><div style={lbl}>Targeting Criteria</div><div style={txt}>{data.targeting_criteria}</div></div>
          <div style={sec}>
            <div style={lbl}>KPI Targets</div>
            {Object.entries(data.kpi_targets).map(([k,v]) => <div key={k} style={{ display: "flex", justifyContent: "space-between", padding: "4px 0", borderBottom: "1px solid rgba(255,255,255,0.03)", fontSize: 12 }}><span style={{ color: "rgba(255,255,255,0.5)" }}>{k}</span><span style={{ fontWeight: 700, color: "#a5b4fc", fontFamily: "'DM Mono'" }}>{v}</span></div>)}
          </div>
        </div>
      );

      if (action === "outreach") return (
        <div>
          <div style={{ fontSize: 11, fontWeight: 700, color: "#a5b4fc", marginBottom: 12 }}>Outreach for {data.prospect_name} · F-Score {data.f_score}</div>
          {[["Email", data.email_variant], ["LinkedIn Message", data.linkedin_variant], ["Voicemail Script", data.voicemail_script]].map(([label, content]) => (
            <div key={label} style={{ ...sec, ...card }}>
              <div style={{ ...lbl, marginBottom: 6 }}>{label}</div>
              <div style={txt}>{content}</div>
            </div>
          ))}
        </div>
      );

      if (action === "analyze") return (
        <div>
          <div style={{ fontSize: 11, fontWeight: 700, color: "#a5b4fc", marginBottom: 12 }}>Weekly Intelligence Briefing</div>
          <div style={sec}><div style={lbl}>Top Opportunities</div><div style={txt}>{data.top_opportunities}</div></div>
          <div style={sec}><div style={lbl}>Pattern Analysis</div><div style={txt}>{data.reasoning}</div></div>
          <div style={sec}><div style={lbl}>This Week's Actions</div><div style={txt}>{data.recommendations}</div></div>
          <div style={sec}><div style={lbl}>Full Briefing</div><div style={{ ...txt, background: "rgba(99,102,241,0.04)", border: "1px solid rgba(99,102,241,0.1)", borderRadius: 8, padding: 14 }}>{data.full_briefing}</div></div>
        </div>
      );

      return null;
    };

    // ─── Main App ───

    function App() {
      const [sectors, setSectors] = useState(["Tech", "Finance"]);
      const [eventCats, setEventCats] = useState(["liquidity"]);
      const [states, setStates] = useState([]);
      const [minAssets, setMinAssets] = useState(500000);
      const [maxAssets, setMaxAssets] = useState(5000000);

      const [results, setResults] = useState(null);
      const [stats, setStats] = useState(null);
      const [methodology, setMethodology] = useState(null);
      const [explanation, setExplanation] = useState(null);

      const [loading, setLoading] = useState(false);
      const [error, setError] = useState(null);
      const [expandedId, setExpandedId] = useState(null);
      const [showML, setShowML] = useState(false);
      const [showPipeline, setShowPipeline] = useState(false);
      const [showStats, setShowStats] = useState(false);
      const [limit, setLimit] = useState(30);
      const [health, setHealth] = useState(null);
      const [showHunter, setShowHunter] = useState(false);
      const [hunterDesc, setHunterDesc] = useState("I'm a fee-only advisor specializing in tech executives and startup founders navigating liquidity events.");
      const [hunterCampaignType, setHunterCampaignType] = useState("LinkedIn thought leadership");
      const [hunterResult, setHunterResult] = useState(null);
      const [hunterLoading, setHunterLoading] = useState(false);
      const [hunterMsg, setHunterMsg] = useState("");

      const toggle = (arr, setArr, val) => setArr(prev => prev.includes(val) ? prev.filter(x => x !== val) : [...prev, val]);

      const profile = { sectors, event_categories: eventCats, states, min_assets: minAssets, max_assets: maxAssets };

      // Health check on mount
      useEffect(() => {
        fetch(`${API}/health`).then(r => r.json()).then(setHealth).catch(() => setError("Cannot reach backend. Is it running on localhost:8000?"));
      }, []);

      const runScore = async () => {
        setLoading(true); setError(null); setResults(null); setStats(null); setExplanation(null);
        try {
          const [scoreRes, statsRes] = await Promise.all([
            fetch(`${API}/score?limit=200`, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(profile) }),
            fetch(`${API}/stats`, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(profile) }),
          ]);
          if (!scoreRes.ok) throw new Error(`Score API: ${scoreRes.status}`);
          if (!statsRes.ok) throw new Error(`Stats API: ${statsRes.status}`);
          setResults(await scoreRes.json());
          setStats(await statsRes.json());
          setLimit(30);
        } catch (e) { setError(e.message); }
        setLoading(false);
      };

      const loadExplanation = async (prospectId) => {
        try {
          const res = await fetch(`${API}/explain/${prospectId}`, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(profile) });
          if (!res.ok) throw new Error(`Explain API: ${res.status}`);
          setExplanation(await res.json());
        } catch (e) { console.error(e); }
      };

      const loadMethodology = async () => {
        if (methodology) { setShowML(!showML); return; }
        try {
          const res = await fetch(`${API}/methodology`);
          setMethodology(await res.json());
          setShowML(true);
        } catch (e) { console.error(e); }
      };

      const handleExpand = (id) => {
        if (expandedId === id) { setExpandedId(null); setExplanation(null); return; }
        setExpandedId(id);
        setExplanation(null);
        loadExplanation(id);
      };

      const callHunter = async (action) => {
        setHunterLoading(true); setHunterResult(null);
        const msgs = {
          strategy: "Crafting your growth strategy...",
          campaign: "Building your campaign plan...",
          outreach: "Drafting personalized outreach...",
          analyze: "Hunter is analyzing your practice...",
        };
        setHunterMsg(msgs[action] || "Hunter is thinking...");
        try {
          let url, body;
          if (action === "strategy") {
            url = `${API}/hunter/strategy`;
            body = { profile, advisor_description: hunterDesc };
          } else if (action === "campaign") {
            url = `${API}/hunter/campaign`;
            body = { profile, campaign_type: hunterCampaignType };
          } else if (action === "outreach") {
            if (!results) { setHunterMsg("Run the F-Score pipeline first to get top prospects."); setHunterLoading(false); return; }
            const topId = results.results[0]?.prospect?.id;
            if (!topId) { setHunterMsg("No prospects to draft outreach for."); setHunterLoading(false); return; }
            url = `${API}/hunter/outreach/${topId}`;
            body = profile;
          } else if (action === "analyze") {
            url = `${API}/hunter/analyze`;
            body = profile;
          }
          const res = await fetch(url, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(body) });
          if (!res.ok) {
            const err = await res.json().catch(() => ({ detail: res.statusText }));
            throw new Error(err.detail || `HTTP ${res.status}`);
          }
          const data = await res.json();
          setHunterResult({ action, data });
          setHunterMsg("");
        } catch (e) {
          setHunterMsg(`Error: ${e.message}`);
        }
        setHunterLoading(false);
      };

      return (
        <div style={{
          minHeight: "100vh",
          background: "#07070c",
          backgroundImage: [
            "radial-gradient(ellipse 70% 50% at 8% 0%,  rgba(99,102,241,0.09) 0%, transparent 60%)",
            "radial-gradient(ellipse 60% 40% at 92% 100%, rgba(139,92,246,0.07) 0%, transparent 55%)",
            "radial-gradient(ellipse 40% 30% at 50% 45%,  rgba(99,102,241,0.03) 0%, transparent 60%)",
          ].join(","),
          padding: "32px 16px",
        }}>
          <div style={{ maxWidth: 760, margin: "0 auto" }}>

            {/* Header */}
            <div style={{ marginBottom: 28, display: "flex", alignItems: "flex-start", gap: 12, flexWrap: "wrap" }}>
              <div style={{ flex: 1, minWidth: 280 }}>
                <div style={{ display: "flex", alignItems: "center", gap: 11, marginBottom: 7 }}>
                  <div style={{
                    width: 36, height: 36, borderRadius: 10,
                    background: "linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%)",
                    display: "flex", alignItems: "center", justifyContent: "center",
                    fontSize: 16, fontWeight: 800, letterSpacing: -0.5,
                    boxShadow: "0 0 0 1px rgba(99,102,241,0.3), 0 4px 16px rgba(99,102,241,0.25)",
                  }}>F</div>
                  <div>
                    <h1 style={{ fontSize: 19, fontWeight: 800, fontFamily: "'Playfair Display',serif", letterSpacing: -0.3, lineHeight: 1.1 }}>
                      F-Score Prospect Engine
                    </h1>
                    <p style={{ fontSize: 11, color: "rgba(255,255,255,0.28)", lineHeight: 1.4, marginTop: 2 }}>
                      FastAPI · React · ML scoring pipeline · {health
                        ? <span style={{ color: "rgba(99,102,241,0.8)" }}>{health.prospects_loaded} prospects</span>
                        : <span style={{ color: "rgba(255,255,255,0.18)" }}>connecting…</span>
                      }
                    </p>
                  </div>
                </div>
              </div>
              <div style={{ display: "flex", gap: 5, flexWrap: "wrap", alignItems: "center" }}>
                <button className="tab-btn" onClick={() => { setShowPipeline(!showPipeline); setShowML(false); setShowStats(false); setShowHunter(false); }} style={{ padding: "5px 11px", borderRadius: 7, border: "1px solid rgba(255,255,255,0.08)", background: showPipeline ? "rgba(99,102,241,0.12)" : "transparent", color: showPipeline ? "#a5b4fc" : "rgba(255,255,255,0.38)", fontSize: 10, cursor: "pointer", fontWeight: 600 }}>Pipeline</button>
                <button className="tab-btn" onClick={() => { loadMethodology(); setShowPipeline(false); setShowStats(false); setShowHunter(false); }} style={{ padding: "5px 11px", borderRadius: 7, border: "1px solid rgba(255,255,255,0.08)", background: showML ? "rgba(99,102,241,0.12)" : "transparent", color: showML ? "#a5b4fc" : "rgba(255,255,255,0.38)", fontSize: 10, cursor: "pointer", fontWeight: 600 }}>ML Deep Dive</button>
                {stats && <button className="tab-btn" onClick={() => { setShowStats(!showStats); setShowPipeline(false); setShowML(false); setShowHunter(false); }} style={{ padding: "5px 11px", borderRadius: 7, border: "1px solid rgba(255,255,255,0.08)", background: showStats ? "rgba(99,102,241,0.12)" : "transparent", color: showStats ? "#a5b4fc" : "rgba(255,255,255,0.38)", fontSize: 10, cursor: "pointer", fontWeight: 600 }}>Stats</button>}
                <button className="tab-btn tab-btn-hunter" onClick={() => { setShowHunter(!showHunter); setShowPipeline(false); setShowML(false); setShowStats(false); }} style={{
                  padding: "5px 12px", borderRadius: 7,
                  border: `1px solid ${showHunter ? "rgba(139,92,246,0.5)" : "rgba(139,92,246,0.18)"}`,
                  background: showHunter ? "rgba(139,92,246,0.18)" : "rgba(139,92,246,0.04)",
                  color: showHunter ? "#d4bbff" : "rgba(199,160,255,0.55)",
                  fontSize: 10, cursor: "pointer", fontWeight: 700, letterSpacing: 0.2,
                }}>Hunter AI ✦</button>
              </div>
            </div>

            {/* Error */}
            {error && (
              <div style={{ background: "rgba(239,68,68,0.08)", border: "1px solid rgba(239,68,68,0.2)", borderRadius: 8, padding: 14, marginBottom: 16, fontSize: 12, color: "#f87171" }}>
                {error}
              </div>
            )}

            {/* Pipeline */}
            {showPipeline && (
              <div style={{ background: "rgba(99,102,241,0.04)", border: "1px solid rgba(99,102,241,0.12)", borderRadius: 12, padding: 20, marginBottom: 16, animation: "fadeIn 0.3s" }}>
                <h3 style={{ fontSize: 13, fontWeight: 700, color: "#a5b4fc", marginBottom: 14 }}>Scoring Pipeline — Client → API → ML → Response</h3>
                <div style={{ display: "flex", alignItems: "center", gap: 0, overflowX: "auto", paddingBottom: 8 }}>
                  {[
                    { s: "POST /api/score", d: "Client sends AdvisorProfile JSON", i: "📤" },
                    { s: "Data Layer", d: "200 synthetic prospects loaded in memory", i: "📊" },

                </div>
                <div style={{ flex: 1, minWidth: 130 }}>
                  <label style={{ display: "block", fontSize: 10, fontWeight: 700, color: "rgba(255,255,255,0.3)", marginBottom: 5, textTransform: "uppercase", letterSpacing: 1 }}>Max Assets</label>
                  <select value={maxAssets} onChange={e => setMaxAssets(Number(e.target.value))} style={{ width: "100%", padding: "8px 10px", borderRadius: 8, border: "1px solid rgba(255,255,255,0.08)", background: "rgba(255,255,255,0.03)", color: "#fff", fontSize: 12 }}>
                    {MAX_ASSET_OPTIONS.map(o => <option key={o.value} value={o.value} style={{ background: "#1a1a2e" }}>{o.label}</option>)}
                  </select>
                </div>
              </div>

              <button className="run-btn" onClick={runScore} disabled={loading || !health} style={{
                width: "100%", padding: "12px", borderRadius: 10, border: "none",
                background: loading
                  ? "rgba(99,102,241,0.25)"
                  : "linear-gradient(135deg, #6366f1 0%, #7c3aed 50%, #8b5cf6 100%)",
                color: "#fff", fontSize: 13, fontWeight: 700, cursor: loading ? "wait" : "pointer",
                letterSpacing: 0.4, opacity: health ? 1 : 0.35,
              }}>
                {loading ? "Running pipeline…" : results ? "Re-Score All Prospects" : "Run F-Score Pipeline →"}
              </button>
            </div>

            {/* Loading */}
            {loading && <Spinner />}

            {/* Results */}
            {results && !loading && (
              <div style={{ animation: "fadeInUp 0.4s ease both" }}>
                {/* Summary */}
                <div style={{ display: "flex", gap: 8, marginBottom: 16 }}>
                  {[
                    { label: "High Intent", sub: "80+", count: results.high_intent_count, color: "#22c55e", bg: "rgba(34,197,94,0.05)", bd: "rgba(34,197,94,0.14)" },
                    { label: "Warm", sub: "60–79", count: results.warm_count, color: "#eab308", bg: "rgba(234,179,8,0.05)", bd: "rgba(234,179,8,0.12)" },
                    { label: "Total Scored", sub: "all", count: results.total_prospects, color: "rgba(255,255,255,0.45)", bg: "rgba(255,255,255,0.018)", bd: "rgba(255,255,255,0.07)" },
                  ].map((m, i) => (
                    <div key={i} style={{
                      flex: 1, background: m.bg, border: `1px solid ${m.bd}`,
                      borderRadius: 10, padding: "12px 12px", textAlign: "center",
                      animation: `fadeInUp 0.4s ease ${i * 0.08}s both`,
                    }}>
                      <div style={{ fontSize: 24, fontWeight: 800, color: m.color, fontFamily: "'DM Mono'", lineHeight: 1 }}>{m.count}</div>
                      <div style={{ fontSize: 9, color: m.color, opacity: 0.55, textTransform: "uppercase", letterSpacing: 0.9, fontWeight: 600, marginTop: 4 }}>{m.label} <span style={{ opacity: 0.5 }}>({m.sub})</span></div>
                    </div>
                  ))}
                </div>

                {/* Prospect Cards */}
                <div style={{ display: "flex", flexDirection: "column", gap: 4 }}>
                  {results.results.slice(0, limit).map((r, idx) => {
                    const p = r.prospect;
                    const sc = colorOf(r.f_score);
                    const expanded = expandedId === p.id;
                    const cardClass = r.f_score >= 80 ? "card card-hi" : r.f_score >= 60 ? "card card-warm" : "card card-def";
                    return (
                      <div key={p.id} className={cardClass} onClick={() => handleExpand(p.id)} style={{
                        background: expanded ? "rgba(99,102,241,0.06)" : "rgba(255,255,255,0.012)",
                        border: `1px solid ${expanded ? "rgba(99,102,241,0.18)" : r.f_score >= 80 ? "rgba(34,197,94,0.1)" : r.f_score >= 60 ? "rgba(234,179,8,0.07)" : "rgba(255,255,255,0.05)"}`,
                        borderRadius: 9, padding: "11px 14px", cursor: "pointer",
                        animation: `fadeInUp 0.3s ease ${Math.min(idx, 20) * 0.03}s both`,
                      }}>
                        <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                          <span style={{ fontSize: 10, fontWeight: 700, color: "rgba(255,255,255,0.15)", fontFamily: "'DM Mono'", minWidth: 22 }}>#{r.rank}</span>
                          <div style={{ flex: 1, minWidth: 0 }}>
                            <div style={{ display: "flex", alignItems: "center", gap: 6, marginBottom: 1 }}>
                              <span style={{ fontSize: 13, fontWeight: 600 }}>{p.name}</span>
                              <span style={{ fontSize: 9, fontWeight: 600, padding: "2px 6px", borderRadius: 100, background: `${sc}18`, color: sc }}>{r.status}</span>
                            </div>
                            <div style={{ fontSize: 10, color: "rgba(255,255,255,0.3)" }}>
                              {p.occupation} · {p.city}, {p.state} · {fmt(p.assets)}
                            </div>
                          </div>
                          <div style={{ display: "flex", alignItems: "center", gap: 6, minWidth: 80 }}>
                            <div style={{ flex: 1, height: 4, borderRadius: 2, background: "rgba(255,255,255,0.04)", overflow: "hidden" }}>
                              <div style={{ width: `${r.f_score}%`, height: "100%", borderRadius: 2, background: sc, transition: "width 0.6s cubic-bezier(0.4,0,0.2,1)" }} />
                            </div>
                            <span style={{ fontSize: 12, fontWeight: 700, color: sc, fontFamily: "'DM Mono'", minWidth: 24 }}>{r.f_score}</span>
                          </div>
                        </div>

                        {/* Expanded Detail */}
                        {expanded && (
                          <div style={{ marginTop: 12, paddingTop: 12, borderTop: "1px solid rgba(255,255,255,0.04)" }}>
                            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr 1fr", gap: 10, marginBottom: 10 }}>
                              {[["Age", p.age], ["Income", `${fmt(p.income * 1000)}/yr`], ["Has Advisor", p.has_advisor ? "Yes" : "No"], ["Searching", p.searching_online ? "Yes" : "No"]].map(([l, v]) => (
                                <div key={l}>
                                  <div style={{ fontSize: 9, color: "rgba(255,255,255,0.25)", textTransform: "uppercase", letterSpacing: 0.8 }}>{l}</div>
                                  <div style={{ fontSize: 12, fontWeight: 600, color: "rgba(255,255,255,0.6)", fontFamily: "'DM Mono'" }}>{v}</div>
                                </div>
                              ))}
                            </div>

                            {p.events.length > 0 && (
                              <div style={{ marginBottom: 10 }}>
                                <div style={{ fontSize: 9, color: "rgba(255,255,255,0.25)", textTransform: "uppercase", letterSpacing: 0.8, marginBottom: 4 }}>Life Events</div>
                                <div style={{ display: "flex", flexWrap: "wrap", gap: 4 }}>
                                  {p.events.map((ev, j) => (
                                    <span key={j} style={{ fontSize: 10, padding: "3px 8px", borderRadius: 100, background: "rgba(139,92,246,0.1)", color: "#c4b5fd" }}>
                                      {ev.event} <span style={{ opacity: 0.5 }}>({ev.days_ago}d ago)</span>
                                    </span>
                                  ))}
                                </div>
                              </div>
                            )}

                            <div style={{ fontSize: 10, color: "rgba(255,255,255,0.35)", marginBottom: 5, fontWeight: 600 }}>Feature Decomposition (from /api/explain/{p.id})</div>
                            {explanation && explanation.prospect.id === p.id ? (
                              <>
                                <FeatureBar label="Niche Align" value={explanation.features.niche_alignment} color="#6366f1" />
                                <FeatureBar label="Asset Fit" value={explanation.features.asset_fit} color="#8b5cf6" />
                                <FeatureBar label="Life Events" value={explanation.features.life_event_signal} color="#a78bfa" />
                                <FeatureBar label="Geography" value={explanation.features.geo_proximity} color="#818cf8" />
                                <FeatureBar label="Conversion" value={explanation.features.conversion_likelihood} color="#22c55e" />
                                <FeatureBar label="Wealth Coher." value={explanation.features.wealth_coherence} color="#eab308" />
                                <div style={{ marginTop: 8, paddingTop: 8, borderTop: "1px solid rgba(255,255,255,0.03)" }}>
                                  {explanation.explanation.map((line, k) => (
                                    <div key={k} style={{ fontSize: 10, color: "rgba(255,255,255,0.3)", marginBottom: 3, paddingLeft: 10, borderLeft: "2px solid rgba(99,102,241,0.2)" }}>
                                      {line}
                                    </div>
                                  ))}
                                </div>
                              </>
                            ) : (
                              <div style={{ fontSize: 10, color: "rgba(255,255,255,0.2)", fontStyle: "italic" }}>Loading explanation...</div>
                            )}
                          </div>
                        )}
                      </div>
                    );
                  })}
                </div>

                {limit < results.results.length && (
                  <button className="tab-btn" onClick={() => setLimit(l => l + 30)} style={{
                    width: "100%", marginTop: 10, padding: "11px", borderRadius: 9,
                    border: "1px solid rgba(255,255,255,0.06)", background: "rgba(255,255,255,0.01)",
                    color: "rgba(255,255,255,0.28)", fontSize: 11, cursor: "pointer", fontWeight: 500,
                  }}>
                    Load {Math.min(30, results.results.length - limit)} more · {results.results.length - limit} remaining
                  </button>
                )}

                <div style={{ marginTop: 22, background: "rgba(99,102,241,0.03)", border: "1px solid rgba(99,102,241,0.08)", borderRadius: 10, padding: 16, textAlign: "center" }}>
                  <p style={{ fontSize: 11, color: "rgba(255,255,255,0.25)", marginBottom: 3 }}>Full-stack ML prospect matching prototype</p>
                  <p style={{ fontSize: 10, color: "rgba(255,255,255,0.15)" }}>Built by Anastasis Moraitis · Georgia Tech '27 · FastAPI + React</p>
                </div>
              </div>
            )}
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
